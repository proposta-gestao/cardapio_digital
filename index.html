<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="Estela Panelas 🍲 | Cardápio Digital">
  <meta name="twitter:title" content="Estela Panelas 🍲 | Cardápio Digital">
  <meta property="og:description" content="Comida com Afeto">
  <meta name="twitter:description" content="Comida com Afeto">
</head>

<body>

    <!-- Header & Hero Section -->
    <header class="header">
        <div class="banner-desktop" role="img" aria-label="Banner Estela Panelas"></div>
        <div class="top-nav">
            <div class="brand-container">
                <img src="Logo.png" alt="Estela Panelas Logo" class="logo-main">

                <div class="brand-text">
                    <h1 class="brand-name">Estela Panelas 🍲</h1>
                    <h3 class="brand-subtitle">Comida Artesanal Feita com Amor</h3>
                </div>
            </div>
            <div class="nav-actions">
                <button class="cart-toggle" id="btnCart" aria-label="Ver carrinho">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-count" id="contador">0</span>
                </button>
            </div>
        </div>
        <div class="search-bar-container">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="busca" placeholder="O que você deseja comer hoje?" aria-label="Buscar pratos">
            </div>
        </div>
    </header>

    <main class="main-content">
        <!-- Categories Navigation -->
        <nav class="categories-nav" aria-label="Categorias de produtos">
            <div class="categories-list" id="categoriesList">
                <button class="cat-btn active" data-cat="todos">Todos</button>
                <!-- Categorias dinâmicas via Supabase -->
            </div>
        </nav>

        <!-- Menu Grid -->
        <section class="menu-section">
            <h1 class="section-title">Nosso Cardápio</h1>
            <div class="menu-grid" id="menu">
                <!-- Produtos serão renderizados via JS -->
            </div>
        </section>
    </main>

    <!-- Shopping Cart Sidebar -->
    <aside class="cart-sidebar" id="cart" aria-hidden="true">
        <div class="cart-header">
            <h2>Seu Pedido</h2>
            <button class="close-cart" id="closeCart">&times;</button>
        </div>

        <div class="cart-body" id="cartItems">
            <!-- Itens do carrinho via JS -->
            <div class="empty-cart-msg">Seu carrinho está vazio.</div>
        </div>

        <footer class="cart-footer">
            <!-- Seção de Pessoal -->
            <div class="address-section" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">
                <h3>Seus Dados</h3>
                <div class="form-group">
                    <label for="clienteNome">Seu Nome</label>
                    <input type="text" id="clienteNome" placeholder="Ex: Maria Silva">
                </div>
            </div>
            
            <!-- Seção de Endereço -->
            <div class="address-section">
                <h3>Endereço de Entrega</h3>

                <div class="form-group">
                    <label for="cep">CEP</label>
                    <div class="cep-input-wrapper">
                        <input type="text" id="cep" placeholder="00000-000" maxlength="9" aria-label="CEP">
                        <button id="btnBuscaCep" class="btn-search-cep">Buscar</button>
                    </div>
                    <span id="cepError" class="error-message"></span>
                </div>

                <div class="form-group">
                    <label for="endereco">Logradouro</label>
                    <input type="text" id="endereco" placeholder="Rua, Avenida, etc." readonly>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" placeholder="123">
                    </div>
                    <div class="form-group">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento" placeholder="Apto, sala, etc.">
                    </div>
                </div>

                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" placeholder="Bairro" readonly>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" placeholder="Cidade" readonly>
                    </div>
                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <input type="text" id="estado" placeholder="UF" readonly maxlength="2">
                    </div>
                </div>
            </div>

            <div class="coupon-section">
                <input type="text" id="cupom" placeholder="Tem um cupom?">
                <button id="btnCupom">Aplicar</button>
            </div>
            <div class="total-section">
                <span>Total</span>
                <span class="total-price">R$ <span id="total">0,00</span></span>
            </div>
            <button class="btn-checkout" id="btnEnviar">
                <span>Enviar Pedido via WhatsApp</span>
                <span class="wa-icon">📱</span>
            </button>
        </footer>
    </aside>

    <!-- Backdrop for Modals/Sidebar -->
    <div class="backdrop" id="backdrop"></div>

    <!-- Product Detail Popup -->
    <section class="modal" id="popup" aria-modal="true" role="dialog">
        <div class="modal-content">
            <button class="close-modal" id="closeModal">&times;</button>
            <div class="modal-body">
                <div class="modal-image-wrapper">
                    <img id="pimg" src="" alt="">
                </div>
                <div class="modal-info">
                    <h3 id="pnome">Nome do Produto</h3>
                    <p id="pdesc" class="product-description">Descrição detalhada do produto.</p>

                    <div class="product-actions">
                        <div class="quantity-selector">
                            <button class="qty-btn" id="menos" aria-label="Diminuir quantidade">−</button>
                            <span id="qnt" class="qty-value">1</span>
                            <button class="qty-btn" id="mais" aria-label="Aumentar quantidade">+</button>
                        </div>
                        <div class="price-display">
                            R$ <span id="ppreco">0,00</span>
                        </div>
                    </div>

                    <div class="observation-wrapper">
                        <label for="obs">Alguma observação?</label>
                        <textarea id="obs" placeholder="Ex: Sem cebola, ponto da carne, etc."></textarea>
                    </div>

                    <div class="modal-actions-container">
                        <button class="btn-add-confirm" id="confirmar">
                            Adicionar ao Carrinho
                        </button>
                        <div class="post-add-actions" id="postAddActions" style="display: none;">
                            <button class="btn-continue" id="btnContinuar">Comprar Mais</button>
                            <button class="btn-go-cart" id="btnIrCarrinho">Ir para o Carrinho</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

        <script src="index.js"></script>
</body>

</html>
