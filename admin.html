<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Estela Panelas</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <h1>🍲 Estela Panelas</h1>
            <p>Painel de Administração</p>
            <div class="form-group">
                <label for="loginEmail">E-mail</label>
                <input type="email" id="loginEmail" placeholder="admin@estelapanelas.com">
            </div>
            <div class="form-group">
                <label for="loginSenha">Senha</label>
                <input type="password" id="loginSenha" placeholder="••••••••">
            </div>
            <button class="btn-login" id="btnLogin">Entrar</button>
            <p class="login-error" id="loginError"></p>
        </div>
    </div>

    <!-- Admin Layout -->
    <div class="admin-layout" id="adminLayout">
        <header class="admin-header">
            <h1>🍲 Estela Panelas <span style="font-weight:400;color:var(--text-muted);font-size:0.85rem;">Admin</span></h1>
            <div class="admin-header-actions">
                <a href="index.html" class="btn-link-cardapio" target="_blank">Ver Cardápio ↗</a>
                <button class="btn-logout" id="btnLogout">Sair</button>
            </div>
        </header>

        <nav class="admin-tabs">
            <button class="tab-btn active" data-tab="produtos">Produtos</button>
            <button class="tab-btn" data-tab="categorias">Categorias</button>
            <button class="tab-btn" data-tab="cupons">Cupons</button>
        </nav>

        <!-- Products Tab -->
        <div class="tab-content active" id="tab-produtos">
            <div class="stats-row" id="statsRow"></div>
            <div class="admin-toolbar">
                <h2>Produtos</h2>
                <button class="btn-primary" id="btnNovoProduto">+ Novo Produto</button>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Imagem</th>
                            <th>Nome</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="produtosBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Categories Tab -->
        <div class="tab-content" id="tab-categorias">
            <div class="admin-toolbar">
                <h2>Categorias</h2>
                <button class="btn-primary" id="btnNovaCategoria">+ Nova Categoria</button>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Slug</th>
                            <th>Ordem</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="categoriasBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Coupons Tab -->
        <div class="tab-content" id="tab-cupons">
            <div class="admin-toolbar">
                <h2>Cupons de Desconto</h2>
                <button class="btn-primary" id="btnNovoCupom">+ Novo Cupom</button>
            </div>
            <div class="admin-table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Desconto</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="cuponsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div class="admin-modal-backdrop" id="modalProduto">
        <div class="admin-modal">
            <h3 id="modalProdutoTitle">Novo Produto</h3>
            <input type="hidden" id="produtoId">
            <div class="form-group">
                <label for="prodNome">Nome</label>
                <input type="text" id="prodNome" placeholder="Ex: Lasanha Especial">
            </div>
            <div class="form-group">
                <label for="prodDesc">Descrição</label>
                <textarea id="prodDesc" placeholder="Descrição detalhada do produto..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="prodPreco">Preço (R$)</label>
                    <input type="number" id="prodPreco" step="0.01" min="0" placeholder="30.00">
                </div>
                <div class="form-group">
                    <label for="prodEstoque">Estoque</label>
                    <input type="number" id="prodEstoque" min="0" placeholder="50">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="prodCategoria">Categoria</label>
                    <select id="prodCategoria">
                        <option value="">Selecione...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="prodAtivo">Status</label>
                    <select id="prodAtivo">
                        <option value="true">Ativo</option>
                        <option value="false">Inativo</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label for="prodImagem">URL da Imagem</label>
                <input type="text" id="prodImagem" placeholder="URL ou nome do arquivo (ex: Produto1.jpeg)">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fecharModal('modalProduto')">Cancelar</button>
                <button class="btn-save" id="btnSalvarProduto">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Category Modal -->
    <div class="admin-modal-backdrop" id="modalCategoria">
        <div class="admin-modal">
            <h3 id="modalCategoriaTitle">Nova Categoria</h3>
            <input type="hidden" id="catId">
            <div class="form-group">
                <label for="catNome">Nome</label>
                <input type="text" id="catNome" placeholder="Ex: Massas">
            </div>
            <div class="form-group">
                <label for="catSlug">Slug</label>
                <input type="text" id="catSlug" placeholder="Ex: massas">
            </div>
            <div class="form-group">
                <label for="catOrdem">Ordem de Exibição</label>
                <input type="number" id="catOrdem" min="0" placeholder="1">
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fecharModal('modalCategoria')">Cancelar</button>
                <button class="btn-save" id="btnSalvarCategoria">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Coupon Modal -->
    <div class="admin-modal-backdrop" id="modalCupom">
        <div class="admin-modal">
            <h3 id="modalCupomTitle">Novo Cupom</h3>
            <input type="hidden" id="cupomId">
            <div class="form-group">
                <label for="cupomCodigo">Código</label>
                <input type="text" id="cupomCodigo" placeholder="Ex: ESTELA10" style="text-transform:uppercase;">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="cupomDesconto">Desconto (%)</label>
                    <input type="number" id="cupomDesconto" min="1" max="100" step="1" placeholder="10">
                </div>
                <div class="form-group">
                    <label for="cupomAtivo">Status</label>
                    <select id="cupomAtivo">
                        <option value="true">Ativo</option>
                        <option value="false">Inativo</option>
                    </select>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="fecharModal('modalCupom')">Cancelar</button>
                <button class="btn-save" id="btnSalvarCupom">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

        <script src="admin.js"></script>
</body>
</html>
